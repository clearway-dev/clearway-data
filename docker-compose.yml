services:
  # ---------------------------------------------------------------------------
  # BACKEND SERVICE (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build: 
      context: ./backend
    container_name: clearway-data-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      # We construct the connection string dynamically from .env variables
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      CELERY_BROKER_URL: redis://clearway-redis:6379/0
      CELERY_RESULT_BACKEND: redis://clearway-redis:6379/0
    restart: unless-stopped
    # Load env variables specifically for this service (optional but good practice)
    env_file:
      - .env
    # Parametr --reload zajistí, že Uvicorn sám restartuje server při změně kódu
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - clearway-network

  # ---------------------------------------------------------------------------
  # REDIS SERVICE (Celery broker/result backend)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: clearway-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - clearway-network

  # ---------------------------------------------------------------------------
  # CELERY WORKER SERVICE (async logical validation)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
    container_name: clearway-celery-worker
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      CELERY_BROKER_URL: redis://clearway-redis:6379/0
      CELERY_RESULT_BACKEND: redis://clearway-redis:6379/0
    env_file:
      - .env
    command: celery -A app.worker.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - clearway-network

# Use the external network created by the database docker-compose
networks:
  clearway-network:
    external: true  