services:
  # ---------------------------------------------------------------------------
  # BACKEND SERVICE (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build: 
      context: ./backend
    container_name: clearway-data-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # We construct the connection string dynamically from .env variables
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    restart: unless-stopped
    # Load env variables specifically for this service (optional but good practice)
    env_file:
      - .env
    # Parametr --reload zajistí, že Uvicorn sám restartuje server při změně kódu
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - clearway-network

# Use the external network created by the database docker-compose
networks:
  clearway-network:
    external: true  